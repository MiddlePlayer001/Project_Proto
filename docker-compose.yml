version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: estoque-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: estoque_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: estoque-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://admin:admin123@postgres:5432/estoque_db
      SECRET_KEY: sua-chave-secreta-super-segura-aqui
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: estoque-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
